<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>跳一跳 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#7EC8E3;--primary-light:#B8E8F8;--secondary:#FFE4E1;--accent:#FFB6C1;--cream:#FFF8F0;--bg:#F0F8FF;--text:#5B7B8A;--text-dark:#3A5A6A;--border:#D4E6F1;--danger:#FF8A80;--success:#A8E6CF}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#E8F4FD 0%,#FFF5E6 50%,#FFE8F0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.container{background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);border-radius:24px;padding:40px 36px;width:380px;max-width:90vw;box-shadow:0 8px 32px rgba(126,200,227,0.2),0 2px 8px rgba(0,0,0,0.06);border:1px solid rgba(255,255,255,0.6)}
.logo{text-align:center;margin-bottom:28px}
.logo-ears{display:inline-block;position:relative;width:80px;height:50px}
.ear{position:absolute;width:14px;height:40px;background:#fff;border-radius:50%;border:2px solid #E0E0E0;top:-10px}
.ear-l{left:10px;transform:rotate(-15deg)}
.ear-r{right:10px;transform:rotate(15deg)}
.logo-body{width:60px;height:48px;background:#fff;border-radius:50%;margin:0 auto;position:relative;border:2px solid #E0E0E0}
.logo-body::before,.logo-body::after{content:'';position:absolute;width:6px;height:6px;background:#5B9BD5;border-radius:50%;top:16px}
.logo-body::before{left:14px}
.logo-body::after{right:14px}
.logo h1{margin-top:12px;font-size:24px;color:var(--text-dark);font-weight:700;letter-spacing:1px}
.logo p{font-size:13px;color:var(--text);margin-top:4px}
.tabs{display:flex;gap:0;margin-bottom:24px;background:var(--bg);border-radius:14px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;border-radius:11px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:all .25s}
.tab.active{background:#fff;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--text);margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:15px;color:var(--text-dark);background:rgba(255,255,255,0.8);outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--primary)}
.btn{width:100%;padding:13px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--primary),#6BB8D6);color:#fff;box-shadow:0 4px 12px rgba(126,200,227,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(126,200,227,0.4)}
.btn-primary:active{transform:translateY(0)}
.error-msg{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;min-height:20px}
.clouds{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
.cloud{position:absolute;background:rgba(255,255,255,0.5);border-radius:50%;filter:blur(1px)}
.cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%}
.c1{width:100px;height:40px;top:10%;animation:float 25s linear infinite}
.c1::before{width:50px;height:50px;top:-25px;left:15px}
.c1::after{width:60px;height:45px;top:-15px;left:40px}
.c2{width:80px;height:32px;top:25%;animation:float 30s linear infinite;animation-delay:-10s}
.c2::before{width:40px;height:40px;top:-20px;left:12px}
.c2::after{width:48px;height:36px;top:-12px;left:32px}
.c3{width:120px;height:48px;top:60%;animation:float 35s linear infinite;animation-delay:-20s}
.c3::before{width:60px;height:60px;top:-30px;left:20px}
.c3::after{width:72px;height:54px;top:-18px;left:50px}
@keyframes float{from{left:-200px}to{left:110%}}
</style>
</head>
<body>
<div class="clouds">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
</div>
<div class="container">
  <div class="logo">
    <div class="logo-ears"><div class="ear ear-l"></div><div class="ear ear-r"></div></div>
    <div class="logo-body"></div>
    <h1>跳一跳</h1>
    <p>Cinnamoroll 联机版</p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">登录</div>
    <div class="tab" onclick="switchTab('register')">注册</div>
  </div>
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group"><label>用户名</label><input id="loginUser" placeholder="请输入用户名" required></div>
    <div class="form-group"><label>密码</label><input id="loginPass" type="password" placeholder="请输入密码" required></div>
    <button type="submit" class="btn btn-primary">登 录</button>
    <div id="loginErr" class="error-msg"></div>
  </form>
  <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
    <div class="form-group"><label>用户名</label><input id="regUser" placeholder="2-16个字符" required minlength="2" maxlength="16"></div>
    <div class="form-group"><label>密码</label><input id="regPass" type="password" placeholder="至少3个字符" required minlength="3"></div>
    <div class="form-group"><label>确认密码</label><input id="regPass2" type="password" placeholder="再次输入密码" required></div>
    <button type="submit" class="btn btn-primary">注 册</button>
    <div id="regErr" class="error-msg"></div>
  </form>
</div>
<script>
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('registerForm').style.display=t==='register'?'block':'none';
}
async function api(url,body){
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}
async function handleLogin(e){
  e.preventDefault();
  const errEl=document.getElementById('loginErr');
  errEl.textContent='';
  const r=await api('/api/login',{username:document.getElementById('loginUser').value,password:document.getElementById('loginPass').value});
  if(r.error){errEl.textContent=r.error;return;}
  localStorage.setItem('token',r.token);
  localStorage.setItem('user',JSON.stringify(r.user));
  window.location.href='/lobby.html';
}
async function handleRegister(e){
  e.preventDefault();
  const errEl=document.getElementById('regErr');
  errEl.textContent='';
  const p1=document.getElementById('regPass').value,p2=document.getElementById('regPass2').value;
  if(p1!==p2){errEl.textContent='两次密码不一致';return;}
  const r=await api('/api/register',{username:document.getElementById('regUser').value,password:p1});
  if(r.error){errEl.textContent=r.error;return;}
  localStorage.setItem('token',r.token);
  localStorage.setItem('user',JSON.stringify(r.user));
  window.location.href='/lobby.html';
}
(function checkAuth(){
  const t=localStorage.getItem('token');
  if(t)fetch('/api/verify',{headers:{'Authorization':'Bearer '+t}}).then(r=>r.json()).then(d=>{if(d.user)window.location.href='/lobby.html';});
})();
</script>
</body>
</html>
